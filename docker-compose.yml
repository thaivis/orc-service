services:
  orc-service:
    build: .
    platform: linux/amd64
    container_name: orc-service
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Override endpoint to use Docker internal network when running via compose
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # Web Console: http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # One-shot container: creates bucket on first `docker compose up`
  # 90-day lifecycle rule must be set manually via MinIO Console (http://localhost:9001)
  # or: mc ilm add --expiry-days 90 local/thaivis-id-documents
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/thaivis-id-documents &&
      mc anonymous set none local/thaivis-id-documents &&
      echo 'Bucket thaivis-id-documents ready'
      "
    restart: on-failure

volumes:
  minio_data:
